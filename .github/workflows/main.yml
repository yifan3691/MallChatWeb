name: Deploy MallChat Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mallchat-web-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  PNPM_VERSION: 10.8.0
  TARGET_PATH: /opt/1panel/www/sites/mallchat

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        run: pnpm build

      # 需要在仓库 Secrets 中配置：
      # DEPLOY_SERVER_HOST: 服务器 IP 或域名
      # DEPLOY_SERVER_PORT: SSH 端口，可留空，默认 22
      # DEPLOY_SERVER_USER: SSH 用户，可留空，默认 root
      # DEPLOY_KEY: SSH 私钥
      - name: 写入 SSH 私钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: 添加服务器指纹
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: 部署到服务器
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SERVER_USER }}
        run: |
          REMOTE="${DEPLOY_USER:-root}@${DEPLOY_HOST}"
          TARGET_PARENT="$(dirname "$TARGET_PATH")"
          TARGET_NAME="$(basename "$TARGET_PATH")"
          RELEASE_PATH="${TARGET_PARENT}/.${TARGET_NAME}_next"

          ssh -p "${DEPLOY_PORT:-22}" "$REMOTE" "rm -rf '$RELEASE_PATH' && mkdir -p '$RELEASE_PATH'"
          tar -C dist -czf - . | ssh -p "${DEPLOY_PORT:-22}" "$REMOTE" "tar -xzf - -C '$RELEASE_PATH'"
          ssh -p "${DEPLOY_PORT:-22}" "$REMOTE" "rm -rf '$TARGET_PATH' && mv '$RELEASE_PATH' '$TARGET_PATH'"
